<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - Sistem Kontrol Odası</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="h-20 nexus-card border-b flex items-center justify-between px-8 bg-red-950/10">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-red-600 rounded-xl flex items-center justify-center text-xl font-bold text-white"><i class="fa-solid fa-user-shield"></i></div>
            <span class="text-lg font-black tracking-widest text-red-400">NEXUS SÜPER YÖNETİM PANELİ</span>
        </div>
        <div class="flex items-center gap-4">
            <span id="active-admin-badge" class="px-3 py-1 bg-red-900 border border-red-700 rounded-xl text-xs font-bold text-white uppercase">Yetkili: -</span>
            <button onclick="logoutAdmin()" class="px-4 py-2 bg-gray-800 hover:bg-gray-700 text-white rounded-xl text-xs font-bold">Güvenli Çıkış</button>
        </div>
    </header>

    <div class="p-6 max-w-7xl mx-auto w-full grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <div class="lg:col-span-2 space-y-6">
            
            <div class="nexus-card rounded-2xl p-6 shadow-xl">
                <h3 class="text-gray-300 text-sm font-black tracking-wider uppercase mb-4">👤 KAYITLI KULLANICI MATRİSİ</h3>
                <div class="w-full overflow-x-auto bg-gray-950 rounded-xl border border-gray-800">
                    <table class="w-full text-left text-xs">
                        <thead>
                            <tr class="bg-gray-900 border-b border-gray-800 text-gray-400 font-bold uppercase tracking-wider">
                                <th class="p-4">Kullanıcı Adı</th>
                                <th class="p-4">Bakiye</th>
                                <th class="p-4">Çark Hakkı</th>
                                <th class="p-4">Durum</th>
                                <th class="p-4 text-right">Yönetimsel İşlemler</th>
                            </tr>
                        </thead>
                        <tbody id="admin-user-rows">
                            </tbody>
                    </table>
                </div>
            </div>

            <div class="nexus-card rounded-2xl p-6 shadow-xl">
                <h3 class="text-green-400 text-sm font-black tracking-wider uppercase mb-3">➕ SİSTEME YENİ GÖREV ENJEKTE ET</h3>
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
                    <div class="sm:col-span-2">
                        <input type="text" id="task-text-input" placeholder="Örn: Crash oyununda 5 katı kazanç yakala." class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-2.5 text-xs text-white outline-none">
                    </div>
                    <div>
                        <input type="number" id="task-reward-input" placeholder="Ödül (Coin)" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-2.5 text-xs text-yellow-400 font-bold outline-none">
                    </div>
                </div>
                <button onclick="addNewTask()" class="w-full mt-3 py-2.5 bg-green-600 hover:bg-green-500 text-white text-xs font-bold rounded-xl transition-all">GÖREVİ TÜM KULLANICILARA DAĞIT</button>
            </div>

        </div>

        <div class="nexus-card rounded-2xl p-6 shadow-xl flex flex-col justify-between">
            <div class="space-y-4">
                <div class="border-b border-gray-800 pb-2">
                    <h3 class="text-red-400 text-sm font-black tracking-wider uppercase"><i class="fa-solid fa-list-check"></i> ADMİN İŞLEM LOGLARI</h3>
                    <p class="text-[10px] text-gray-500">Yapılan tüm işlemler ad ve saat ile şifrelenmeden listelenir.</p>
                </div>
                <div id="admin-logs-box" class="space-y-2 max-h-96 overflow-y-auto font-mono text-[11px] text-gray-400 divide-y divide-gray-900">
                    </div>
            </div>
            <button onclick="clearLogs()" class="w-full mt-4 py-2 bg-gray-900 border border-gray-800 hover:bg-gray-800 text-gray-400 text-xs font-bold rounded-lg">Log Geçmişini Sıfırla</button>
        </div>

    </div>

    <script>
        const currentAdmin = localStorage.getItem('nexus_current_admin');
        if(!currentAdmin) { window.location.href = 'index.html'; }

        document.getElementById('active-admin-badge').innerText = "YETKİLİ: " + currentAdmin;

        let users = JSON.parse(localStorage.getItem('nexus_users')) || [];
        let tasks = JSON.parse(localStorage.getItem('nexus_tasks')) || [];
        let logs = JSON.parse(localStorage.getItem('nexus_logs')) || [];

        function saveAndRender() {
            localStorage.setItem('nexus_users', JSON.stringify(users));
            localStorage.setItem('nexus_tasks', JSON.stringify(tasks));
            localStorage.setItem('nexus_logs', JSON.stringify(logs));

            // Tabloyu Oluştur
            const tbody = document.getElementById('admin-user-rows');
            tbody.innerHTML = users.map((u, index) => `
                <tr class="border-b border-gray-900 hover:bg-gray-900/40">
                    <td class="p-4 font-bold text-gray-200">${u.username}</td>
                    <td class="p-4 font-mono text-yellow-400 font-bold">${u.coins.toLocaleString()} 🪙</td>
                    <td class="p-4 font-mono text-indigo-400 font-bold">${u.spins} Hak</td>
                    <td class="p-4">${u.banned ? '<span class="text-red-500 font-bold text-[10px] uppercase">BANLI</span>' : '<span class="text-green-400 font-bold text-[10px] uppercase">AKTİF</span>'}</td>
                    <td class="p-4 text-right space-x-1 space-y-1">
                        <button onclick="modifyCoins(${index}, 10000)" class="px-2 py-1 bg-gray-900 border border-gray-800 text-green-400 font-bold text-[10px] rounded-md hover:bg-gray-800">+10k</button>
                        <button onclick="modifyCoins(${index}, -10000)" class="px-2 py-1 bg-gray-900 border border-gray-800 text-red-400 font-bold text-[10px] rounded-md hover:bg-gray-800">-10k</button>
                        <button onclick="modifySpins(${index}, 1)" class="px-2 py-1 bg-gray-900 border border-gray-800 text-indigo-400 font-bold text-[10px] rounded-md hover:bg-gray-800">+1 Çark</button>
                        <button onclick="toggleBan(${index})" class="px-2 py-1 ${u.banned ? 'bg-green-900 text-green-200' : 'bg-red-900 text-red-200'} font-bold text-[10px] rounded-md">${u.banned ? 'Ban Aç' : 'Banla'}</button>
                        <button onclick="deleteUser(${index})" class="px-2 py-1 bg-gray-900 text-gray-500 font-bold text-[10px] rounded-md hover:bg-red-600 hover:text-white">Sil</button>
                    </td>
                </tr>
            `).join('');

            // Logları Oluştur
            const logsBox = document.getElementById('admin-logs-box');
            logsBox.innerHTML = logs.map(l => `
                <div class="pt-2">
                    <span class="text-gray-600">[${l.time}]</span> 
                    <strong class="text-red-400">${l.admin}</strong>: 
                    <span class="text-gray-300">${l.details}</span>
                </div>
            `).join('');
        }

        function pushLog(details) {
            const time = new Date().toLocaleTimeString();
            logs.unshift({ time, admin: currentAdmin, details });
            saveAndRender();
        }

        function modifyCoins(index, amount) {
            users[index].coins = Math.max(0, users[index].coins + amount);
            const actionType = amount > 0 ? "Bakiye Yükledi" : "Bakiye Eksiltti";
            pushLog(`${users[index].username} adlı hesaba ${Math.abs(amount)} COIN ${actionType}.`);
        }

        function modifySpins(index, amount) {
            users[index].spins = Math.max(0, users[index].spins + amount);
            pushLog(`${users[index].username} adlı hesabın günlük çark hakkını +${amount} artırdı.`);
        }

        function toggleBan(index) {
            users[index].banned = !users[index].banned;
            const status = users[index].banned ? "BANLADI" : "BANINI KALDIRDI";
            pushLog(`${users[index].username} kullanıcısını ${status}.`);
        }

        function deleteUser(index) {
            const name = users[index].username;
            if(confirm(`${name} hesabını kalıcı olarak silmek istiyor musunuz?`)) {
                users.splice(index, 1);
                pushLog(`${name} isimli kullanıcı hesabını SİSTEMDEN SİLDİ.`);
            }
        }

        function addNewTask() {
            const txt = document.getElementById('task-text-input').value.trim();
            const reward = parseInt(document.getElementById('task-reward-input').value) || 0;
            if(!txt || reward <= 0) { alert("Geçersiz görev veya ödül!"); return; }

            tasks.push({ id: Date.now(), text: txt, reward: reward });
            pushLog(`Sisteme yeni küresel görev ekledi: "${txt}" (Ödül: ${reward} Coin)`);
            
            document.getElementById('task-text-input').value = '';
            document.getElementById('task-reward-input').value = '';
        }

        function clearLogs() {
            if(confirm("Tüm log geçmişi silinsin mi?")) {
                logs = [];
                saveAndRender();
            }
        }

        function logoutAdmin() {
            localStorage.removeItem('nexus_current_admin');
            window.location.href = 'index.html';
        }

        // İlk kurulum
        saveAndRender();
    </script>
</body>
</html>
