<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - Admin Kontrol Merkezi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="h-20 nexus-card border-b flex items-center justify-between px-8 bg-red-950/10">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-red-600 rounded-xl flex items-center justify-center text-xl font-bold text-white">⚙️</div>
            <span class="text-lg font-black tracking-widest text-red-400">NEXUS SÜPER YÖNETİM PANELİ</span>
        </div>
        <div class="flex items-center gap-4">
            <span id="admin-badge" class="px-3 py-1 bg-red-900 border border-red-700 rounded-xl text-xs font-bold text-white uppercase">Yetkili: -</span>
            <button onclick="localStorage.removeItem('nexus_current_admin'); window.location.href='index.html';" class="px-4 py-2 bg-gray-800 hover:bg-gray-700 text-white rounded-xl text-xs font-bold">Güvenli Çıkış</button>
        </div>
    </header>

    <div class="p-6 max-w-7xl mx-auto w-full grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <!-- SOL / ORTA ALAN: KULLANICI MATRİSİ VE GÖREV EKLE/SİL -->
        <div class="lg:col-span-2 space-y-6">
            
            <div class="nexus-card rounded-2xl p-6 shadow-xl">
                <h3 class="text-gray-300 text-sm font-black tracking-wider uppercase mb-4">👤 SİSTEM OYUNCU LİSTESİ</h3>
                <div class="w-full overflow-x-auto bg-gray-950 rounded-xl border border-gray-800">
                    <table class="w-full text-left text-xs">
                        <thead>
                            <tr class="bg-gray-900 border-b border-gray-800 text-gray-400 font-bold uppercase tracking-wider">
                                <th class="p-4">Kullanıcı</th>
                                <th class="p-4">Şifre (Sadece Admin11)</th>
                                <th class="p-4">Bakiye</th>
                                <th class="p-4 text-right">Aksiyonlar</th>
                            </tr>
                        </thead>
                        <tbody id="admin-rows"></tbody>
                    </table>
                </div>
            </div>

            <!-- GÖREV YÖNETİM MERKEZİ (EKLEME VE SİLME) -->
            <div class="nexus-card rounded-2xl p-6 shadow-xl">
                <h3 class="text-green-400 text-sm font-black tracking-wider uppercase mb-3">📋 GÖREV YÖNETİM MATRİSİ</h3>
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-4">
                    <div class="sm:col-span-2"><input type="text" id="t-txt" placeholder="Görev metni" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-2 text-xs text-white outline-none"></div>
                    <div><input type="number" id="t-rwd" placeholder="Ödül Coin" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-2 text-xs text-yellow-400 font-bold outline-none"></div>
                </div>
                <button onclick="addTask()" class="w-full py-2 bg-green-600 hover:bg-green-500 text-white text-xs font-bold rounded-xl mb-4">YENİ GÖREV ENJEKTE ET</button>
                
                <div class="border-t border-gray-800 pt-3">
                    <p class="text-[10px] text-gray-500 font-bold uppercase mb-2">Mevcut Aktif Görevleri Sil</p>
                    <div id="admin-tasks-list" class="space-y-2"></div>
                </div>
            </div>

        </div>

        <!-- SAĞ ALAN: ADMİN KİMLİK LOG KAYITLARI -->
        <div class="nexus-card rounded-2xl p-6 shadow-xl flex flex-col justify-between">
            <div class="space-y-4">
                <div class="border-b border-gray-800 pb-2">
                    <h3 class="text-red-400 text-sm font-black tracking-wider uppercase">🕒 SİSTEM AKIŞ LOGLARI</h3>
                </div>
                <div id="admin-logs" class="space-y-2 max-h-96 overflow-y-auto font-mono text-[11px] text-gray-400"></div>
            </div>
            <!-- SADECE ADMIN11 İÇİN GEÇMİŞİ SİLME BUTONU -->
            <button onclick="clearSystemLogs()" id="clear-log-btn" class="w-full mt-4 py-2 bg-gray-950 border border-red-900 text-red-400 text-xs font-bold rounded-lg hidden">Geçmiş Sistem Loglarını Kazı (Sil)</button>
        </div>

    </div>

    <script>
        const activeAdmin = localStorage.getItem('nexus_current_admin');
        if(!activeAdmin) window.location.href = 'index.html';

        document.getElementById('admin-badge').innerText = "YETKİLİ: " + activeAdmin;

        // Yetkilendirme Kuralları: Sadece admin11 log silme butonunu görebilir
        if(activeAdmin === 'admin11') {
            document.getElementById('clear-log-btn').classList.remove('hidden');
        }

        let users = JSON.parse(localStorage.getItem('nexus_users')) || [];
        let tasks = JSON.parse(localStorage.getItem('nexus_tasks')) || [];
        let logs = JSON.parse(localStorage.getItem('nexus_logs')) || [];

        function renderAdminPanel() {
            localStorage.setItem('nexus_users', JSON.stringify(users));
            localStorage.setItem('nexus_tasks', JSON.stringify(tasks));
            localStorage.setItem('nexus_logs', JSON.stringify(logs));

            // Kullanıcı Satırları
            const tbody = document.getElementById('admin-rows');
            tbody.innerHTML = users.map((u, idx) => `
                <tr class="border-b border-gray-900">
                    <td class="p-4 font-bold text-gray-200">${u.username}</td>
                    <td class="p-4 font-mono text-gray-400">${activeAdmin === 'admin11' ? u.password : '•••••• (Yetki Yok)'}</td>
                    <td class="p-4 font-mono text-yellow-400 font-bold">${u.coins.toLocaleString()} 🪙</td>
                    <td class="p-4 text-right space-x-1">
                        <button onclick="modCoins(${idx}, 10000)" class="px-2 py-1 bg-gray-900 text-green-400 border border-gray-800 text-[10px] rounded">+</button>
                        <button onclick="modCoins(${idx}, -10000)" class="px-2 py-1 bg-gray-900 text-red-400 border border-gray-800 text-[10px] rounded">-</button>
                        <button onclick="deleteUser(${idx})" class="px-2 py-1 bg-red-900/30 text-red-400 text-[10px] rounded">Sil</button>
                    </td>
                </tr>
            `).join('');

            // Görev Silme Listesi
            document.getElementById('admin-tasks-list').innerHTML = tasks.map((t, idx) => `
                <div class="bg-gray-950 p-2 rounded-lg border border-gray-800 flex justify-between items-center text-[11px]">
                    <span class="text-gray-300">${t.text}</span>
                    <button onclick="deleteTask(${idx})" class="text-red-400 font-bold hover:underline">Görevi Kaldır</button>
                </div>
            `).join('');

            // Loglar
            document.getElementById('admin-logs').innerHTML = logs.map(l => `
                <div class="pt-1 border-b border-gray-900/40"><span class="text-gray-600">[${l.time}]</span> <strong>${l.admin}</strong>: ${l.details}</div>
            `).join('');
        }

        function writeLog(details) {
            logs.unshift({ time: new Date().toLocaleTimeString(), admin: activeAdmin, details });
            renderAdminPanel();
        }

        function modCoins(idx, val) {
            users[idx].coins = Math.max(0, users[idx].coins + val);
            writeLog(`${users[idx].username} hesabına ${val} değerinde bakiye müdahalesi yaptı.`);
        }

        function deleteUser(idx) {
            let name = users[idx].username;
            users.splice(idx, 1);
            writeLog(`${name} isimli kullanıcı hesabını sistemden tamamen sildi.`);
        }

        function addTask() {
            let txt = document.getElementById('t-txt').value.trim();
            let rwd = parseInt(document.getElementById('t-rwd').value) || 0;
            if(!txt || rwd <= 0) return;
            tasks.push({ id: Date.now(), text: txt, reward: rwd });
            writeLog(`Sisteme yeni görev entegre etti: "${txt}"`);
            document.getElementById('t-txt').value = '';
            document.getElementById('t-rwd').value = '';
        }

        function deleteTask(idx) {
            let removed = tasks[idx].text;
            tasks.splice(idx, 1);
            writeLog(`"${removed}" görevini sistemden sildi.`);
        }

        function clearSystemLogs() {
            if(activeAdmin !== 'admin11') { alert("Yetkiniz yok!"); return; }
            if(confirm("Tüm geçmiş akış logları kazınsın mı?")) {
                logs = [];
                renderAdminPanel();
            }
        }

        renderAdminPanel();
    </script>
</body>
</html>
