<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - Admin Paneli</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="h-20 nexus-card border-b flex items-center justify-between px-8 bg-red-950/20">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-red-600 rounded-xl flex items-center justify-center text-xl font-bold text-white"><i class="fa-solid fa-user-shield"></i></div>
            <span class="text-lg font-black tracking-widest text-red-400">NEXUS SYSTEM CONTROL ROOM</span>
        </div>
        <button onclick="window.location.href='index.html'" class="px-4 py-2 bg-gray-800 hover:bg-gray-700 text-white rounded-xl text-xs font-bold">Ana Sayfa</button>
    </header>

    <div class="p-6 max-w-5xl mx-auto w-full space-y-6">
        <div class="nexus-card rounded-2xl p-6 space-y-4 shadow-xl">
            <h3 class="text-red-400 text-sm font-black tracking-widest uppercase">⚙️ KULLANICI MANİPÜLASYON MATRİSİ</h3>
            
            <div class="w-full overflow-x-auto bg-gray-950 rounded-xl border border-gray-800">
                <table class="w-full text-left text-xs">
                    <thead>
                        <tr class="bg-gray-900 border-b border-gray-800 text-gray-400 font-bold uppercase tracking-wider">
                            <th class="p-4">Kullanıcı</th>
                            <th class="p-4">Mevcut Rol</th>
                            <th class="p-4">Sanal Cüzdan</th>
                            <th class="p-4 text-right">Hızlı Aksiyon</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr class="border-b border-gray-900">
                            <td class="p-4 font-bold text-gray-200">AlphaAdmin (Siz)</td>
                            <td class="p-4"><span class="px-2 py-0.5 bg-red-900 text-red-200 text-[10px] font-bold rounded">ADMIN</span></td>
                            <td class="p-4 font-mono font-bold text-yellow-400" id="adm-c1">100.000 🪙</td>
                            <td class="p-4 text-right">
                                <button onclick="addCoins('adm-c1')" class="px-3 py-1.5 bg-gray-900 text-yellow-400 border border-gray-800 font-bold text-[10px] rounded-lg hover:bg-gray-800">+10.000 COIN YÜKLE</button>
                            </td>
                        </tr>
                        <tr class="border-b border-gray-900">
                            <td class="p-4 font-bold text-gray-200">VortexUser (Oyuncu)</td>
                            <td class="p-4"><span class="px-2 py-0.5 bg-gray-800 text-gray-400 text-[10px] font-bold rounded">USER</span></td>
                            <td class="p-4 font-mono font-bold text-yellow-400" id="adm-c2">3.500 🪙</td>
                            <td class="p-4 text-right">
                                <button onclick="addCoins('adm-c2')" class="px-3 py-1.5 bg-gray-900 text-yellow-400 border border-gray-800 font-bold text-[10px] rounded-lg hover:bg-gray-800">+10.000 COIN YÜKLE</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function addCoins(elementId) {
            let el = document.getElementById(elementId);
            let current = parseInt(el.innerText.replace(/[^0-digital]/g, '')) || 0;
            let next = current + 10000;
            el.innerText = next.toLocaleString() + " 🪙";
            alert("Sistem Komutu: Belirtilen cüzdana +10,000 Sanal Coin başarıyla basıldı!");
        }
    </script>
</body>
</html>
