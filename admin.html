<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nexsus Admin V5</title>

<link rel="stylesheet" href="admin.css">
</head>
<body>

<div class="sidebar">

<h2>NEXSUS ADMIN</h2>

<button onclick="showTab('dashboard')">
📊 Dashboard
</button>

<button onclick="showTab('users')">
👥 Kullanıcılar
</button>

<button onclick="showTab('logs')">
📜 Loglar
</button>

<button onclick="logout()">
🚪 Çıkış
</button>

</div>

<div class="content">

<div id="dashboard" class="tab active">

<h1>Dashboard</h1>

<div class="cards">

<div class="card">
<h3>Kullanıcı</h3>
<span id="totalUsers">0</span>
</div>

<div class="card">
<h3>Toplam Coin</h3>
<span id="totalCoins">0</span>
</div>

</div>

</div>

<div id="users" class="tab">

<h1>Kullanıcı Yönetimi</h1>

<input
type="text"
id="searchUser"
placeholder="Kullanıcı ara..."
onkeyup="renderUsers()">

<table>

<thead>

<tr>

<th>ID</th>
<th>Kullanıcı</th>
<th>Coin</th>
<th>Çark</th>
<th>Durum</th>
<th>İşlem</th>

</tr>

</thead>

<tbody id="userTable">

</tbody>

</table>

</div>

<div id="logs" class="tab">

<h1>Loglar</h1>

<div id="logList"></div>

</div>

</div>

<script src="admin.js"></script>

</body>
</html>
