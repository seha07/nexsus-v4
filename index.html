<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - Giriş Paneli</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md nexus-card p-8 rounded-2xl text-center shadow-2xl">
        <div class="w-14 h-14 bg-blue-600 rounded-2xl mx-auto flex items-center justify-center text-2xl font-bold mb-4 shadow-lg text-white">⚡</div>
        <h2 class="text-xl font-black tracking-widest uppercase text-white">NEXUS ENTERTAINMENT</h2>
        <p class="text-xs text-gray-400 mt-1 mb-6">Modüler Rol Tabanlı Eğlence Platformu</p>
        
        <div class="space-y-3">
            <button onclick="goToPage('admin.html')" class="w-full py-4 btn-danger font-bold rounded-xl text-sm flex items-center justify-center gap-2">
                <i class="fa-solid fa-user-shield"></i> YÖNETİCİ (ADMIN) OLARAK GİRİŞ
            </button>
            <button onclick="goToPage('dashboard.html')" class="w-full py-4 btn-primary font-bold rounded-xl text-sm flex items-center justify-center gap-2">
                <i class="fa-solid fa-user"></i> OYUNCU (USER) OLARAK GİRİŞ
            </button>
        </div>
    </div>

    <script>
        function goToPage(page) {
            // Tarayıcı yönlendirmesini tetikler ve butonları kesin olarak aktif eder
            window.location.href = page;
        }
    </script>
</body>
</html>
