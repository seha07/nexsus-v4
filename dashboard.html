<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - Oyun Lobisi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="h-20 nexus-card border-b flex items-center justify-between px-8 sticky top-0 z-50 shadow-xl">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-xl font-bold text-white">⚡</div>
            <span class="text-lg font-black tracking-widest text-white">NEXUS USER LOBBY</span>
        </div>
        <div class="flex items-center gap-6">
            <div class="bg-gray-950 border border-gray-800 px-4 py-2 rounded-xl flex items-center gap-2">
                <span class="text-yellow-400">🪙</span>
                <span id="global-coins" class="font-mono font-bold text-yellow-400 text-sm">50.000</span>
            </div>
            <button onclick="window.location.href='index.html'" class="px-3 py-1.5 bg-red-700 hover:bg-red-600 text-white rounded-xl text-xs font-bold">Güvenli Çıkış</button>
        </div>
    </header>

    <div class="p-6 max-w-7xl mx-auto w-full space-y-8">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            
            <div class="nexus-card rounded-2xl p-6 shadow-md">
                <h3 class="text-yellow-400 font-black tracking-wider text-sm mb-4">🎰 SLOT CLASSIC (3 REELS)</h3>
                <div class="flex justify-center gap-3 my-6">
                    <div id="sc1" class="w-16 h-24 bg-gray-950 border border-gray-800 rounded-xl flex items-center justify-center text-3xl font-bold">🍒</div>
                    <div id="sc2" class="w-16 h-24 bg-gray-950 border border-gray-800 rounded-xl flex items-center justify-center text-3xl font-bold">🍒</div>
                    <div id="sc3" class="w-16 h-24 bg-gray-950 border border-gray-800 rounded-xl flex items-center justify-center text-3xl font-bold">🍒</div>
                </div>
                <p id="sc-msg" class="text-center text-xs font-bold h-4 text-blue-300 mb-4"></p>
                <button onclick="playSlot()" class="w-full py-3 bg-yellow-500 hover:bg-yellow-400 text-gray-950 font-black rounded-xl text-sm">ÇEVİR (100 COIN)</button>
            </div>

            <div class="nexus-card rounded-2xl p-6 shadow-md">
                <h3 class="text-red-400 font-black tracking-wider text-sm mb-4">🚀 CRASH MULTIPLIER</h3>
                <div class="h-36 bg-gray-950 rounded-xl border border-gray-800 flex flex-col items-center justify-center mb-4">
                    <span id="crash-multiplier" class="text-5xl font-mono font-black text-green-400">1.00x</span>
                </div>
                <button onclick="startCrash()" id="crash-btn" class="w-full py-3 btn-danger font-black text-sm rounded-xl">ROKETİ FIRLAT (200 COIN)</button>
            </div>

        </div>
    </div>

    <script>
        let coins = 50000;
        const items = ['🍒', '🍋', '💎', '⭐', '7️⃣'];
        let crashInterval = null;
        let crashRunning = false;
        let currentMult = 1.0;

        function playSlot() {
            if(coins < 100) { alert("Bakiye yetersiz!"); return; }
            coins -= 100;
            document.getElementById('global-coins').innerText = coins.toLocaleString();
            document.getElementById('sc-msg').innerText = "Dönüyor...";

            setTimeout(() => {
                const r1 = items[Math.floor(Math.random()*5)];
                const r2 = items[Math.floor(Math.random()*5)];
                const r3 = items[Math.floor(Math.random()*5)];
                document.getElementById('sc1').innerText = r1;
                document.getElementById('sc2').innerText = r2;
                document.getElementById('sc3').innerText = r3;

                if(r1 === r2 && r2 === r3) {
                    coins += 2000;
                    document.getElementById('sc-msg').innerText = "🎉 BÜYÜK KAZANÇ! +2000 COIN";
                } else {
                    document.getElementById('sc-msg').innerText = "❌ Kazanç Yok.";
                }
                document.getElementById('global-coins').innerText = coins.toLocaleString();
            }, 500);
        }

        function startCrash() {
            const btn = document.getElementById('crash-btn');
            if(crashRunning) {
                clearInterval(crashInterval);
                crashRunning = false;
                let win = Math.floor(200 * currentMult);
                coins += win;
                alert(`🚀 Nakit Çıkışı! +${win} Coin kazandınız.`);
                btn.innerText = "ROKETİ FIRLAT (200 COIN)";
                btn.className = "w-full py-3 btn-danger font-black text-sm rounded-xl";
                document.getElementById('global-coins').innerText = coins.toLocaleString();
                return;
            }

            if(coins < 200) { alert("Bakiye yetersiz!"); return; }
            coins -= 200;
            document.getElementById('global-coins').innerText = coins.toLocaleString();
            crashRunning = true;
            currentMult = 1.0;
            let target = (1.0 + Math.random() * 3.5).toFixed(2);
            btn.innerText = "CASHOUT (NAKİT ÇIKIŞ)";
            btn.className = "w-full py-3 btn-success font-black text-sm rounded-xl";

            crashInterval = setInterval(() => {
                currentMult += 0.05;
                document.getElementById('crash-multiplier').innerText = currentMult.toFixed(2) + "x";

                if(currentMult >= target) {
                    clearInterval(crashInterval);
                    crashRunning = false;
                    document.getElementById('crash-multiplier').innerText = "💥 PATLADI @ " + target + "x";
                    btn.innerText = "ROKETİ FIRLAT (200 COIN)";
                    btn.className = "w-full py-3 btn-danger font-black text-sm rounded-xl";
                }
            }, 100);
        }
    </script>
</body>
</html>
